services:
  - type: web
    name: chainvigil
    env: python
    # Build: install Python deps + build React frontend (Node.js is pre-installed on Render)
    buildCommand: pip install -r requirements.txt && cd frontend-app && npm ci && npm run build && cd ..
    # Start: uvicorn reads $PORT injected by Render
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT --workers 1 --timeout-keep-alive 75
    healthCheckPath: /health
    envVars:
      - key: PYTHON_ENV
        value: production
      # Uncomment and set in Render dashboard if you have a Neo4j instance:
      # - key: NEO4J_URI
      #   value: bolt://your-neo4j-host:7687
      # - key: NEO4J_PASSWORD
      #   sync: false
